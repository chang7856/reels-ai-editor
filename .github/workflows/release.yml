name: Build release binaries

# Triggered by pushing a tag like v1.0.0, OR manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build helpers
        # ffmpeg static binaries get fetched by the build script and bundled
        # into the .app — we only need create-dmg here for packaging.
        run: brew install create-dmg
      - name: Build
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-macOS-arm64
          path: dist/ReelsAIEditor-macOS-arm64.dmg

  macos-intel:
    runs-on: macos-13   # last GitHub-hosted Intel runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build helpers
        run: brew install create-dmg
      - name: Build
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-macOS-intel
          path: dist/ReelsAIEditor-macOS-intel.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        shell: cmd
        run: scripts\build_windows.bat
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-Windows-x64
          path: dist/ReelsAIEditor-Windows-x64.zip

  publish:
    needs: [macos-arm64, macos-intel, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.zip
          generate_release_notes: true
          body: |
            **Release date:** $(date +%Y-%m-%d)

            | Download | Platform | Update status |
            |---|---|---|
            | `ReelsAIEditor-macOS-arm64.dmg` | macOS · Apple Silicon (M1/M2/M3/M4) | **Actively maintained** |
            | `ReelsAIEditor-macOS-intel.dmg` | macOS · Intel CPU (pre-2020 Mac) | Frozen at v1.0 — will not be updated again |
            | `ReelsAIEditor-Windows-x64.zip` | Windows 10 / 11 | Frozen at v1.0 — will not be updated again |

            **Only the Apple Silicon build receives future updates.** Intel Mac + Windows ship once at v1.0 as a one-shot snapshot.

            ## First-launch notes
            - **macOS:** right-click the app and choose "Open" the first time (developer not Apple-notarised).
            - **ffmpeg is bundled inside the app — you do not need to install anything else.**
            - First run downloads the Whisper `small` model (~470 MB) into your user cache.

            Full release notes: see [RELEASES.md](RELEASES.md) in the repo.
