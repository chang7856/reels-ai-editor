name: Build release binaries

# Triggered by pushing a tag like v1.1.0, OR manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build helpers
        # ffmpeg static binaries get fetched by the build script and bundled
        # into the .app — we only need create-dmg here for packaging.
        run: brew install create-dmg
      - name: Build
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-macOS-arm64
          path: dist/ReelsAIEditor-macOS-arm64.dmg

  macos-intel:
    runs-on: macos-13   # last GitHub-hosted Intel runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build helpers
        run: brew install create-dmg
      - name: Build
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-macOS-intel
          path: dist/ReelsAIEditor-macOS-intel.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        shell: cmd
        run: scripts\build_windows.bat
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-Windows-x64
          path: dist/ReelsAIEditor-Windows-x64.zip

  publish:
    needs: [macos-arm64, macos-intel, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        # Replace asset files on the existing tag but DO NOT touch the
        # release body or name. We curate the Chinese install guide by hand
        # via `gh release edit` and don't want CI to overwrite it. Omitting
        # `body:` / `body_path:` / `generate_release_notes:` keeps the
        # existing release notes untouched per softprops/action-gh-release
        # v2 default behavior.
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.zip
          fail_on_unmatched_files: true
