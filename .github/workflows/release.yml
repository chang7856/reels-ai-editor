name: Build release binaries

# Triggered by pushing a tag like v1.0.0, OR manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ffmpeg (for the build, not bundled)
        run: brew install ffmpeg create-dmg
      - name: Build
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-macOS-arm64
          path: dist/ReelsAIEditor-macOS-arm64.dmg

  macos-intel:
    runs-on: macos-13   # last GitHub-hosted Intel runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ffmpeg
        run: brew install ffmpeg create-dmg
      - name: Build
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-macOS-intel
          path: dist/ReelsAIEditor-macOS-intel.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        shell: cmd
        run: scripts\build_windows.bat
      - uses: actions/upload-artifact@v4
        with:
          name: ReelsAIEditor-Windows-x64
          path: dist/ReelsAIEditor-Windows-x64.zip

  publish:
    needs: [macos-arm64, macos-intel, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.zip
          generate_release_notes: true
